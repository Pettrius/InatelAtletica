<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Hub da Atlética · App Inatel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="device">
  <div class="notch"></div>
  <div class="screen">
    <div class="statusbar">
      <span>9:41</span>
      <div class="dots"><i></i><i></i><i></i><span style="margin-left:4px">100%</span></div>
    </div>

    <div class="viewport" id="viewport"><!-- views injected --></div>

    <div class="toast" id="toast">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      <span id="toastmsg"></span>
    </div>

    <div class="overlay" id="overlay">
      <div class="sheet">
        <div class="mi">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </div>
        <h4>Sair do App Inatel?</h4>
        <p>Você será direcionado ao <b>formulário oficial da Atlética</b> para concluir sua inscrição.</p>
        <div class="mrow">
          <button class="btn ghost" onclick="closeModal()">Cancelar</button>
          <button class="btn primary" onclick="confirmRedirect()">Continuar</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="script.js" defer></script>
</body>
</html>
